<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Acme Corp — Senior Software Engineer Application</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f8f9fa; }
    h1 { color: #1a1a2e; margin-bottom: 5px; }
    h2 { color: #16213e; font-size: 18px; margin-top: 30px; border-bottom: 2px solid #0f3460; padding-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 30px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; color: #333; font-size: 14px; }
    label .required { color: #e74c3c; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="url"], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus { border-color: #0f3460; outline: none; box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }
    .row { display: flex; gap: 16px; }
    .row .form-group { flex: 1; }
    textarea { min-height: 100px; resize: vertical; }
    .btn { background: #0f3460; color: white; border: none; padding: 12px 32px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #16213e; }
    .status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; }
    .status.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    input[type="file"] { padding: 8px 0; }
    .company-header { background: #0f3460; color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    .company-header h1 { color: white; margin: 0; }
    .company-header .subtitle { color: #a0c4ff; margin: 0; }
  </style>
</head>
<body>
  <div class="company-header">
    <h1>Acme Corp</h1>
    <p class="subtitle">Senior Software Engineer — Remote (US)</p>
  </div>

  <form id="application-form" onsubmit="return handleSubmit(event)">
    <h2>Personal Information</h2>
    
    <div class="row">
      <div class="form-group">
        <label for="first_name">First Name <span class="required">*</span></label>
        <input type="text" id="first_name" name="first_name" required placeholder="Enter your first name">
      </div>
      <div class="form-group">
        <label for="last_name">Last Name <span class="required">*</span></label>
        <input type="text" id="last_name" name="last_name" required placeholder="Enter your last name">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address <span class="required">*</span></label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
    </div>

    <h2>Address</h2>
    
    <div class="form-group">
      <label for="street_address">Street Address</label>
      <input type="text" id="street_address" name="street_address" placeholder="123 Main St">
    </div>
    
    <div class="row">
      <div class="form-group">
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="San Francisco">
      </div>
      <div class="form-group">
        <label for="state">State</label>
        <input type="text" id="state" name="state" placeholder="CA">
      </div>
      <div class="form-group">
        <label for="zip_code">Zip Code</label>
        <input type="text" id="zip_code" name="zip_code" placeholder="94102">
      </div>
    </div>

    <h2>Professional Links</h2>
    
    <div class="form-group">
      <label for="linkedin_url">LinkedIn Profile</label>
      <input type="url" id="linkedin_url" name="linkedin_url" placeholder="https://linkedin.com/in/yourprofile">
    </div>

    <div class="form-group">
      <label for="portfolio_url">Portfolio / Website</label>
      <input type="url" id="portfolio_url" name="portfolio_url" placeholder="https://yoursite.com">
    </div>

    <div class="form-group">
      <label for="github_url">GitHub</label>
      <input type="url" id="github_url" name="github_url" placeholder="https://github.com/yourusername">
    </div>

    <h2>Experience</h2>

    <div class="form-group">
      <label for="current_company">Current Company</label>
      <input type="text" id="current_company" name="current_company" placeholder="Where do you currently work?">
    </div>

    <div class="form-group">
      <label for="current_title">Current Job Title</label>
      <input type="text" id="current_title" name="current_title" placeholder="Your current role">
    </div>

    <h2>Additional</h2>

    <div class="form-group">
      <label for="resume">Resume / CV <span class="required">*</span></label>
      <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">
    </div>

    <div class="form-group">
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="cover_letter" placeholder="Tell us why you're interested in this role..."></textarea>
    </div>

    <div class="form-group">
      <label for="how_heard">How did you hear about us?</label>
      <select id="how_heard" name="how_heard">
        <option value="">Select...</option>
        <option value="linkedin">LinkedIn</option>
        <option value="indeed">Indeed</option>
        <option value="glassdoor">Glassdoor</option>
        <option value="referral">Employee Referral</option>
        <option value="website">Company Website</option>
        <option value="other">Other</option>
      </select>
    </div>

    <button type="submit" class="btn">Submit Application</button>
  </form>

  <div id="status" class="status"></div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = document.getElementById('application-form');
      const data = new FormData(form);
      const entries = Object.fromEntries(data.entries());
      
      document.getElementById('status').className = 'status success';
      document.getElementById('status').innerHTML = '<strong>✓ Application Submitted!</strong><br>Fields filled: ' + 
        Object.entries(entries).filter(([k,v]) => v && k !== 'resume').map(([k,v]) => k + ': ' + v).join('<br>');
      
      return false;
    }
  </script>
</body>
</html>
